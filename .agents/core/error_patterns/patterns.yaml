- id: '16.1'
  name: 워크플로 실행 요청 시 파일 Read 누락 → 동일 도구 무한 반복
  category: 프롬프트 라우팅 실패
  last_seen: '2026-06-03'
  occurrence_count: 1
  detail: '사용자가 "~ workflow 돌려줘" 요청 시 에이전트가 .agents/workflows/<name>.md 를

    먼저 Read 하지 않고, 추측으로 도구 호출 → 실패 → 동일 도구 + 동일 인자 반복.

    AGENTS.md §2.3 "실패 후 동일 입력 금지" 및 워크플로 Read 누락 (TOP 7) 위반.

    대응: Read 도구로 .agents/workflows/<name>.md 또는 .agents/skills/<name>/SKILL.md

    1회 읽기 → 핵심 단계 추출 → 단계별 실행. frontmatter trigger: 는 색인 메타일

    뿐 자동 실행되지 않음. 동일 도구 3회 반복 시 즉시 중단 + 전략 전환.

    '
- id: '16.2'
