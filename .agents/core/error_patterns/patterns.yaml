  last_seen: '2026-06-11'
  occurrence_count: 1
  detail: 'StrReplace 호출 시 path에 절대 경로를 제공하여 실패하거나, old_string이 파일 내에서 고유하지 않아 여러 매치가 검출(Found N matches)되어 실패하는 오류.

