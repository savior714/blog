- id: '5.6'
  name: plan-lint WARN을 통과로 오인하고 Blueprint 미수정
  category: 계획서 (Blueprint) 실수
  last_seen: '2026-06-04'
  occurrence_count: 1
  detail: 'plan-lint가 exit 0을 반환해도 stdout에 [WARN] 이 포함되면 계약 위반이다.

    issues 없이 warnings만 있으면 plan-lint는 exit 1을 반환한다 — exit code만으로도 경고 게이트 실패를 감지한다.

    atomicity 위반(whole-feature scope, forbidden conjunction 등)은 구현 전 반드시 수정해야 한다.

    대응:

    1. plan-lint stdout 전체 스캔 — [WARN] 또는 [FAIL] 감지 시 즉시 중단

    2. exit code가 0이어도 WARN 존재 시 수정 후 재검증

    3. Blueprint Task 분할: Goal에 "및"/"와"/"과"/"그리고"/"또한"/"동시에" 있으면 atomic 단위로 분할

    4. Conclusion 25자 미만 → 파일명 + 구체적 액션 포함

    5. Verify 미인식 runner(pnpm exec vitest 등) → just recipe 또는 인식된 runner로 교체

    6. Status: done 상태와 무관하게 plan-lint 결과를 최종 판단 기준으로 삼는다

    '
- id: '5.7'
  name: Task Status/Conclusion 에디터 직접 수정
  category: 계획서 (Blueprint) 실수
  last_seen: '2026-06-09'
  occurrence_count: 1
  detail: 'plan-task-close CLI 대신 에디터(StrReplace/edit)로 Task의 Status·Conclusion을 직접 수정.

    plan_task_close.py는 정규식으로 Status/Conclusion 패턴을 매칭하므로, 에디터 수정 시

    공백·인덴트·마커 형식이 다르면 갱신이 안 되거나 인접 Task Conclusion이 덮어씌워짐.

    대응:

    1. Blueprint Task Status/Conclusion 수정은 always just plan-task-close CLI만 사용

    2. Conclusion은 최소 25자 이상, 구체적 검증 결과 포함

    3. [완료 시 기입] 등 placeholder 사용 금지

    '
- id: '5.8'
  name: DoD에 just plan-close 포함 (재귀 타임아웃)
  category: 계획서 (Blueprint) 실수
  last_seen: '2026-06-09'
  occurrence_count: 1
  detail: 'DoD(Definition of Done) 섹션에 just plan-close를 백틱 명령어로 포함하면,

    plan_close_gate.py의 extract_dod_verify_specs()가 이를 verify 명령어로 추출해 실행.

    즉 plan-close가 자기 자신을 호출하는 재귀가 발생 → 120초 타임아웃.

    대응:

    1. DoD 섹션에 just plan-close를 verify 명령어로 포함하지 않음

    2. plan-close는 Closeout Task의 Verify에서 별도 실행

    3. DoD는 실제 검증 명령어(pytest, just plan-lint 등)만 포함

    '
- id: '5.9'
  name: Verify에 pytest 전체 파일 실행 (구체성 부족)
  category: 계획서 (Blueprint) 실수
  last_seen: '2026-06-09'
  occurrence_count: 7
  detail: 'plan-lint가 Verify에 pytest -k <selector> 또는 ::test_name 없이 전체 파일을 실행하면

    "Task#N Verify must prove one automated outcome — split tasks" 오류.

    Atomic Task는 단일 테스트로 검증해야 한다.

    대응:

    1. Verify에 pytest -k <selector> 또는 ::test_name 반드시 포함

    2. 여러 테스트 검증 필요 시 Task 분할

    3. 예: pytest tests/.../test_file.py::test_specific_name -q

    '
- id: '5.10'
  name: just plan-close 실행 전 linear-sync 누락
  category: 계획서 (Blueprint) 실수
  last_seen: '2026-06-10'
  occurrence_count: 1
  detail: 'just plan-close 실행 시 linear-sync가 선행되지 않으면 "Linear synchronization required" 오류 발생.

    대응:

    1. plan-close 실행 전에 반드시 just linear-sync(또는 just linear-sync-plan)를 성공적으로 완료할 것.

    2. CI/CD 또는 Closeout 태스크 시 이 두 과정의 순서와 종속성을 꼭 확인.

    '
