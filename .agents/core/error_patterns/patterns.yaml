    대응: .agents/reference/mcp_tools.md 의 SSOT 도구명 참조.

    검증: `just mcp-tools-validate` (lint-turn-end 자동 실행).

    '
- id: '4.5'
  name: read_file 별칭 호출 + edit oldString 누락
  category: 도구 사용 실수
  last_seen: '2026-06-05'
  occurrence_count: 1
  detail: '모델이 `read_file`이라는 별칭을 호출하지만, 현재 세션에 등록된 도구 중에는

    `read_file`이 없음.     올바른 도구명: `desktop-commander_read_file`, 또는 내장 `Read`.

    또한 `edit` 도구 호출 시 필수 파라미터 `oldString`을 누락하여

    `SchemaError(Missing key at ["oldString"])` 발생.

    대응:

    1. 파일 읽기 → `desktop-commander_read_file(path="절대경로")` 또는 내장 `Read`

    2. edit 호출 → `{ filePath, oldString: "정확히일치", newString: "바꿀내용" }`

    3. `edit` → `desktop-commander_edit_block` 자동 전환 금지 (서로 다른 도구/스키마)

    4. 도구명 불확실 시 `.agents/reference/mcp_tools.md` SSOT 참조

    '
