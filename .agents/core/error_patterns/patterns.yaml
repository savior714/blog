  category: 프롬프트 라우팅 실패
  last_seen: '2026-06-05'
  occurrence_count: 1
  detail: '모델이 `TOOL_REQUEST` / `END_TOOL_REQUEST`·`<tool_call>`·pseudo JSON 등 텍스트로

    도구 호출을 출력했으나, 호스트 native structured tool API가 이를 실행하지 않음.

    대응: 호스트가 노출한 native tool call만 사용. content·reasoning에 tool syntax

    텍스트 출력 금지. SSOT: principles §1.1 · 06-workflow §16.2.'
